<g id="MTEXT_2_">
	<g>
		<text transform="matrix(1 0 0 1 289.5229 72.5398)"><tspan x="0" y="0" class="st12 st13 st14">Roof covering must be polycarbonate or </tspan><tspan x="0" y="14.4" class="st12 st15 st14">non-combustible</tspan><tspan x="88" y="14.4" class="st12 st13 st14"> and any ceiling lining </tspan><tspan x="0" y="28.8" class="st12 st13 st14">must be </tspan><tspan x="46" y="28.8" class="st12 st15 st14">non-combustible</tspan></text>
