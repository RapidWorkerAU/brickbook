<text transform="matrix(1 0 0 1 431.0317 197.8622)"><tspan x="0" y="0" class="st0 st1">Hose tap for</tspan><tspan x="0" y="14.4" class="st0 st1">washing down</tspan></text>
<text transform="matrix(1 0 0 1 329.6962 38.26)"><tspan x="0" y="0" class="st0 st1">Where a fast connection is</tspan><tspan x="0" y="14.4" class="st0 st1">required, the fast fill line shall </tspan><tspan x="0" y="28.8" class="st0 st1">terminate external to the unit </tspan><tspan x="0" y="43.2" class="st0 st1">with an air gap either </tspan><tspan x="0" y="57.6" class="st0 st1">a. directly over the basin or</tspan><tspan x="0" y="72" class="st0 st1">b. tundish</tspan></text>
<text transform="matrix(1 0 0 1 328.0294 138.9896)"><tspan x="0" y="0" class="st0 st1">Air gap minimum 2 times the </tspan><tspan x="0" y="14.4" class="st0 st1">diameter of drinking water supply unit</tspan></text>
<rect x="424.01" y="272.02" class="st2" width="115.4" height="146.19"/>
<text transform="matrix(1 0 0 1 424.0133 282.3232)"><tspan x="0" y="0" class="st0 st1">Hose connection </tspan><tspan x="0" y="14.4" class="st0 st1">vacuum breaker. </tspan><tspan x="0" y="28.8" class="st0 st1">Where chemical </tspan><tspan x="0" y="43.2" class="st0 st1">injection is used a </tspan><tspan x="0" y="57.6" class="st0 st1">higher degree </tspan><tspan x="0" y="72" class="st0 st1">of protection is </tspan><tspan x="0" y="86.4" class="st0 st1">required in </tspan><tspan x="0" y="100.8" class="st0 st1">accordance with</tspan><tspan x="0" y="115.2" class="st0 st1">AS/NZS 3500.1</tspan></text>
<text transform="matrix(1 0 0 1 283.0294 305.1958)"><tspan x="0" y="0" class="st0 st1">Cooling</tspan><tspan x="0" y="14.4" class="st0 st1">tower basin</tspan></text>
<text transform="matrix(1 0 0 1 210.0294 339.1955)" class="st0 st1">Overflow</text>
<text transform="matrix(1 0 0 1 115.696 131.323)" class="st0 st1">Cooling tower</text>
<text transform="matrix(1 0 0 1 28.1388 342.8976)"><tspan x="0" y="0" class="st0 st1">Bleed</tspan><tspan x="0" y="14.4" class="st0 st1">off</tspan><tspan x="0" y="28.8" class="st0 st1">line</tspan></text>
<text transform="matrix(1 0 0 1 286.8053 110.5504)"><tspan x="0" y="0" class="st0 st1">Stop</tspan><tspan x="0" y="14.4" class="st0 st1">tap</tspan></text>
<text transform="matrix(1 0 0 1 280.4632 171.217)"><tspan x="0" y="0" class="st0 st1">Stop</tspan><tspan x="4" y="14.4" class="st0 st1">tap</tspan></text>
<text transform="matrix(1 0 0 1 148.4718 389.0508)" class="st0 st1">Flow</text>
<text transform="matrix(1 0 0 1 100.3582 468.1155)" class="st0 st1">Drain</text>
<text transform="matrix(1 0 0 1 283.0291 272.5294)"><tspan x="0" y="0" class="st0 st1">Rim of cooling</tspan><tspan x="0" y="14.4" class="st0 st1">tower basin</tspan></text>
<text transform="matrix(1 0 0 1 127.3629 409.3625)" class="st0 st1">Air gap min 150mm</text>
